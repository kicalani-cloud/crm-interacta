<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life Mobile">
<meta name="theme-color" content="#e30613">
<link rel="manifest" href="manifest-life.json">
<title>CRM Life Mobile</title>
<style>
  :root {
    --red: #e30613;
    --dark: #1a1a2e;
    --card: #ffffff;
    --bg: #f0f2f5;
    --border: #e0e0e0;
    --text: #222;
    --muted: #888;
    --assegnato: #1976d2;
    --sospeso: #f57c00;
    --lavorazione: #388e3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  header {
    background: var(--red);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.5px; }
  header span { font-size: 0.85rem; opacity: 0.85; }

  .topbar {
    background: white;
    padding: 12px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .tabs { display: flex; gap: 8px; }
  .tab {
    padding: 7px 20px;
    border-radius: 20px;
    border: 2px solid var(--border);
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
    background: white;
    transition: all 0.2s;
  }
  .tab.active { background: var(--red); color: white; border-color: var(--red); }
  .tab:hover:not(.active) { border-color: var(--red); color: var(--red); }

  .btn-aggiorna {
    margin-left: auto;
    background: var(--red);
    color: white;
    border: none;
    padding: 9px 22px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-aggiorna:hover { opacity: 0.85; }
  .btn-aggiorna:disabled { opacity: 0.5; cursor: not-allowed; }

  .last-update {
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 20px 24px;
    min-height: calc(100vh - 130px);
  }

  .column { display: flex; flex-direction: column; gap: 10px; }
  .col-header {
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.95rem;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .col-assegnato { background: var(--assegnato); }
  .col-sospeso   { background: var(--sospeso); }
  .col-lavorazione { background: var(--lavorazione); }

  .badge {
    background: rgba(255,255,255,0.3);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.8rem;
  }

  .card {
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-left: 4px solid transparent;
    transition: box-shadow 0.2s;
    cursor: default;
  }
  .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.13); }
  .card.assegnato   { border-left-color: var(--assegnato); }
  .card.sospeso     { border-left-color: var(--sospeso); }
  .card.lavorazione { border-left-color: var(--lavorazione); }

  .card-ticket {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-ticket .zona {
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
  }
  .card-row {
    display: flex;
    gap: 6px;
    font-size: 0.82rem;
    margin-bottom: 3px;
    align-items: flex-start;
  }
  .card-row .lbl { color: var(--muted); min-width: 60px; }
  .card-row .val { color: var(--text); font-weight: 500; }
  .card-row .val a { color: var(--red); text-decoration: none; }

  .empty { text-align: center; color: var(--muted); padding: 30px 0; font-size: 0.9rem; }
  .loading { text-align: center; color: var(--muted); padding: 20px; }

  .btn-sospendi {
    margin-top: 10px;
    width: 100%;
    background: var(--sospeso);
    color: white;
    border: none;
    padding: 7px 0;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    opacity: 0.9;
  }
  .btn-sospendi:hover { opacity: 1; }

  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 14px;
    padding: 28px;
    width: 340px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h3 { margin-bottom: 16px; font-size: 1rem; color: var(--sospeso); }
  .modal label { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 0.9rem;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-weight: 600; font-size: 0.9rem; cursor: pointer;
  }
  .btn-confirm { background: var(--sospeso); color: white; }
  .btn-cancel  { background: var(--bg); color: var(--text); }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #login-screen {
    position: fixed; inset: 0;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  #login-screen.hidden { display: none; }
  .login-box {
    background: white;
    border-radius: 16px;
    padding: 40px 36px;
    width: 320px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .login-box h2 { color: var(--red); font-size: 1.3rem; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
  .login-box input {
    width: 100%; padding: 12px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 1rem; text-align: center;
    letter-spacing: 2px; margin-bottom: 12px;
  }
  .login-box input:focus { border-color: var(--red); outline: none; }
  .login-box button {
    width: 100%; padding: 12px; background: var(--red); color: white;
    border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
    cursor: pointer;
  }
  .login-error { color: red; font-size: 0.85rem; margin-top: 8px; display: none; }
  .btn-esci {
    background: transparent; color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.4);
    padding: 5px 14px; border-radius: 14px;
    font-size: 0.8rem; cursor: pointer;
  }
  .btn-esci:hover { background: rgba(255,255,255,0.15); }

  .province-bar {
    background: white;
    padding: 8px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .pbtn {
    padding: 5px 14px;
    border-radius: 16px;
    border: 2px solid var(--border);
    background: white;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pbtn.active { background: var(--dark); color: white; border-color: var(--dark); }
  .pbtn:hover:not(.active) { border-color: var(--dark); }

  .btn-copia {
    background: #1976d2;
    color: white;
    border: none;
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-copia:hover { opacity: 0.85; }

  .modal-copia { max-width: 380px; }
  .modal-copia h3 { color: #1976d2; margin-bottom: 14px; }
  .prov-checks { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0 18px; }
  .prov-checks label { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
  .copied-msg { color: var(--lavorazione); font-weight: 600; text-align: center; margin-top: 10px; }

  @media (max-width: 900px) {
    .board { grid-template-columns: 1fr; padding: 12px; gap: 12px; }
    header { padding: 10px 16px; }
    header h1 { font-size: 1.1rem; }
    .topbar { padding: 10px 12px; gap: 8px; }
    .tab { padding: 6px 14px; font-size: 0.82rem; }
    .btn-aggiorna { padding: 8px 14px; font-size: 0.82rem; }
    .province-bar { padding: 8px 12px; gap: 6px; }
    .pbtn { padding: 4px 12px; font-size: 0.78rem; }
    .card { padding: 12px; }
    .card-ticket { font-size: 0.9rem; }
    .card-row { font-size: 0.8rem; }
    .modal { width: calc(100vw - 40px); }
  }
</style>
</head>
<body>

<!-- Schermata login -->
<div id="login-screen">
  <div class="login-box">
    <h2>🌐 CRM FWA WindTre</h2>
    <p>Inserisci la password per accedere</p>
    <input type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Entra</button>
    <div class="login-error" id="login-error">Password errata</div>
  </div>
</div>

<header>
  <h1>🌐 CRM FWA WindTre</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="ora-header"></span>
    <button class="btn-esci" onclick="esci()">Esci</button>
  </div>
</header>

<div class="topbar">
  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">🔵 Life Mobile</div>
    <div class="tab" onclick="switchTab(1)">🟢 KP Service</div>
  </div>
  <span class="last-update" id="last-update">—</span>
  <button class="btn-copia" onclick="openCopia()">📋 Copia</button>
  <button class="btn-aggiorna" id="btn-aggiorna" onclick="aggiorna()">
    <span>🔄</span> Aggiorna
  </button>
</div>

<div class="province-bar" id="province-bar"></div>

<!-- Modal Copia Email -->
<div class="modal-overlay" id="modal-copia-overlay">
  <div class="modal modal-copia">
    <h3>📋 Copia tabella email</h3>
    <div style="font-size:0.85rem;color:var(--muted);margin-bottom:8px;">Seleziona le province da includere:</div>
    <div class="prov-checks" id="prov-checks"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCopia()">Annulla</button>
      <button class="btn-confirm" style="background:#1976d2;" onclick="copiaTabella()">📋 Copia</button>
    </div>
    <div id="copied-msg" class="copied-msg" style="display:none;">✅ Copiato! Incolla nella mail.</div>
  </div>
</div>

<!-- Modal Sospendi -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>⏸ Sospendi ticket</h3>
    <div id="modal-ticket-name" style="font-weight:700;margin-bottom:4px;"></div>
    <label>Data appuntamento</label>
    <input type="text" id="modal-data" placeholder="gg/mm/aaaa">
    <label>Ora appuntamento</label>
    <input type="text" id="modal-ora" placeholder="HH:MM">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn-confirm" onclick="conferma()">Conferma</button>
    </div>
    <div id="modal-status" style="margin-top:10px;font-size:0.82rem;color:var(--muted);text-align:center;"></div>
  </div>
</div>

<div class="board" id="board">
  <div class="column">
    <div class="col-header col-assegnato">📋 Assegnati <span class="badge" id="cnt-assegnato">0</span></div>
    <div id="col-assegnato"><div class="loading">Caricamento…</div></div>
  </div>
  <div class="column">
    <div class="col-header col-lavorazione">🔧 In Lavorazione <span class="badge" id="cnt-lavorazione">0</span></div>
    <div id="col-lavorazione"><div class="empty">—</div></div>
  </div>
  <div class="column">
    <div class="col-header col-sospeso">⏸ Sospesi <span class="badge" id="cnt-sospeso">0</span></div>
    <div id="col-sospeso"><div class="empty">—</div></div>
  </div>
</div>

<script>
const GH_TOKEN = ['ghp_NdVG92IWfd3w1','F1pndRVC8PM8g4Y7k1m1LPl'].join('');
const GH_ACTIONS_TOKEN = GH_TOKEN;

const SOURCES = [
  { repo: 'kicalani-cloud/interacta-bot',  label: 'Life Mobile', province: ['RN','RA','FC'] },
  { repo: 'kicalani-cloud/interacta-bot2', label: 'KP Service',  province: ['PU','BO','FE','MO'] }
];

let currentTab = 0;
let currentProv = 'TUTTE';
let cachedData = null;
let userLat = null, userLon = null;
const geoCache = {};

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function geocode(indirizzo) {
  if (!indirizzo) return null;
  if (geoCache[indirizzo]) return geoCache[indirizzo];
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(indirizzo + ', Italia')}&format=json&limit=1`, {
      headers: { 'Accept-Language': 'it' }
    });
    const d = await r.json();
    if (d[0]) {
      const coords = { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) };
      geoCache[indirizzo] = coords;
      return coords;
    }
  } catch(e) {}
  return null;
}

async function sortByDistance(tickets) {
  if (!userLat) return tickets;
  const withCoords = await Promise.all(tickets.map(async p => {
    const coords = await geocode(p.indirizzo);
    const dist = coords ? haversine(userLat, userLon, coords.lat, coords.lon) : 9999;
    return { ...p, _dist: dist };
  }));
  return withCoords.sort((a, b) => a._dist - b._dist);
}

function getLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    if (cachedData) renderData(cachedData);
  });
}

function switchTab(idx) {
  currentTab = idx;
  currentProv = 'TUTTE';
  cachedData = null;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  loadData();
}

function buildProvinceBar(province) {
  const bar = document.getElementById('province-bar');
  const all = ['TUTTE', ...province];
  bar.innerHTML = all.map(p =>
    `<button class="pbtn ${p === currentProv ? 'active' : ''}" onclick="filterProv('${p}')">${p}</button>`
  ).join('');
}

function filterProv(prov) {
  currentProv = prov;
  document.querySelectorAll('.pbtn').forEach(b => b.classList.toggle('active', b.textContent === prov));
  renderData(cachedData);
}

async function renderData(data) {
  if (!data) return;
  const filter = p => currentProv === 'TUTTE' || (p.centrale || '') === currentProv;

  let assegnati   = (data.posts       || []).filter(filter);
  const sospesi     = (data.sospesi     || []).filter(filter);
  const lavorazione = (data.lavorazione || []).filter(filter);

  document.getElementById('last-update').textContent = data.last_update ? `Aggiornato: ${data.last_update}` : '';

  // Ordina assegnati per distanza se il tecnico ha condiviso la posizione
  if (userLat && urlParam) {
    assegnati = await sortByDistance(assegnati);
  }

  const colA = document.getElementById('col-assegnato');
  colA.innerHTML = assegnati.length ? assegnati.map(p => card(p, 'assegnato')).join('') : '<div class="empty">Nessun ticket assegnato</div>';
  document.getElementById('cnt-assegnato').textContent = assegnati.length;

  const colS = document.getElementById('col-sospeso');
  colS.innerHTML = sospesi.length ? sospesi.map(p => card(p, 'sospeso')).join('') : '<div class="empty">Nessun ticket sospeso</div>';
  document.getElementById('cnt-sospeso').textContent = sospesi.length;

  const colL = document.getElementById('col-lavorazione');
  colL.innerHTML = lavorazione.length ? lavorazione.map(p => card(p, 'lavorazione')).join('') : '<div class="empty">Nessun ticket in lavorazione</div>';
  document.getElementById('cnt-lavorazione').textContent = lavorazione.length;
}

async function ghRead(repo, file) {
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/${file}`, {
    headers: { Authorization: `token ${GH_TOKEN}` }
  });
  if (!r.ok) return null;
  const d = await r.json();
  return JSON.parse(atob(d.content.replace(/\n/g, '')));
}

function card(p, stato) {
  const zona = p.centrale || p.zona || '—';
  const tel = p.telefono ? `<a href="tel:${p.telefono}">${p.telefono}</a>` : '—';
  const olo = p.ticket_olo ? `<div class="card-row"><span class="lbl">OLO</span><span class="val">${p.ticket_olo}</span></div>` : '';
  const distLabel = (p._dist && p._dist < 9999) ? `<span style="font-size:0.75rem;color:var(--muted);font-weight:600;">📍 ${p._dist.toFixed(1)} km</span>` : '';
  const btnSospendi = stato === 'assegnato'
    ? `<button class="btn-sospendi" onclick="openModal('${p.ticket}')">⏸ Sospendi</button>`
    : '';
  return `
    <div class="card ${stato}">
      <div class="card-ticket">
        <span>${p.ticket}</span>
        <span class="zona">${zona}</span>
      </div>
      ${distLabel}
      ${olo}
      <div class="card-row"><span class="lbl">Cliente</span><span class="val">${p.cliente || '—'}</span></div>
      <div class="card-row"><span class="lbl">Indirizzo</span><span class="val">${p.indirizzo || '—'}</span></div>
      <div class="card-row"><span class="lbl">Tel</span><span class="val">${tel}</span></div>
      <div class="card-row"><span class="lbl">Data</span><span class="val">${p.data_seg || '—'}</span></div>
      ${btnSospendi}
    </div>`;
}

// ── Copia tabella email ──────────────────────────────────────────
function openCopia() {
  const src = SOURCES[currentTab];
  const checks = document.getElementById('prov-checks');
  checks.innerHTML = src.province.map(p => `
    <label><input type="checkbox" value="${p}" checked> ${p}</label>
  `).join('');
  document.getElementById('copied-msg').style.display = 'none';
  document.getElementById('modal-copia-overlay').classList.add('open');
}

function closeCopia() {
  document.getElementById('modal-copia-overlay').classList.remove('open');
}

function copiaTabella() {
  const selezionate = [...document.querySelectorAll('#prov-checks input:checked')].map(c => c.value);
  const tutti = cachedData ? (cachedData.posts || []) : [];
  const righe = tutti.filter(p => selezionate.includes(p.centrale || ''));

  const html = `
<table style="border-collapse:collapse;font-size:14px;font-family:Arial,sans-serif;width:100%;">
  <thead>
    <tr style="background:#e30613;color:white;">
      <th style="padding:8px 12px;border:1px solid #ccc;text-align:left;">INC</th>
      <th style="padding:8px 12px;border:1px solid #ccc;text-align:left;">Nome Cognome</th>
      <th style="padding:8px 12px;border:1px solid #ccc;text-align:left;">Indirizzo Città</th>
      <th style="padding:8px 12px;border:1px solid #ccc;text-align:left;">Provincia</th>
      <th style="padding:8px 12px;border:1px solid #ccc;text-align:left;">Cellulare</th>
      <th style="padding:8px 12px;border:1px solid #ccc;text-align:left;">Data Guasto</th>
      <th style="padding:8px 12px;border:1px solid #ccc;text-align:left;">OLO</th>
    </tr>
  </thead>
  <tbody>
    ${righe.map((p, i) => `
    <tr style="background:${i % 2 === 0 ? '#ffffff' : '#f5f5f5'};">
      <td style="padding:8px 12px;border:1px solid #ccc;">${p.ticket || '—'}</td>
      <td style="padding:8px 12px;border:1px solid #ccc;">${p.cliente || '—'}</td>
      <td style="padding:8px 12px;border:1px solid #ccc;">${p.indirizzo || '—'}</td>
      <td style="padding:8px 12px;border:1px solid #ccc;">${p.centrale || '—'}</td>
      <td style="padding:8px 12px;border:1px solid #ccc;">${p.telefono || '—'}</td>
      <td style="padding:8px 12px;border:1px solid #ccc;">${p.data_seg || '—'}</td>
      <td style="padding:8px 12px;border:1px solid #ccc;">${p.ticket_olo || '—'}</td>
    </tr>`).join('')}
  </tbody>
</table>`;

  const blob = new Blob([html], { type: 'text/html' });
  const item = new ClipboardItem({ 'text/html': blob });
  navigator.clipboard.write([item]).then(() => {
    document.getElementById('copied-msg').style.display = 'block';
    setTimeout(closeCopia, 2000);
  }).catch(() => {
    // Fallback testo semplice
    const testo = righe.map(p =>
      `${p.ticket} | ${p.cliente} | ${p.indirizzo} | ${p.centrale || '—'} | ${p.telefono} | ${p.data_seg} | ${p.ticket_olo}`
    ).join('\n');
    navigator.clipboard.writeText(testo);
    document.getElementById('copied-msg').style.display = 'block';
    setTimeout(closeCopia, 2000);
  });
}
// ────────────────────────────────────────────────────────────────

let modalTicket = null;

function openModal(ticket) {
  modalTicket = ticket;
  document.getElementById('modal-ticket-name').textContent = ticket;
  document.getElementById('modal-data').value = '';
  document.getElementById('modal-ora').value = '';
  document.getElementById('modal-status').textContent = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalTicket = null;
}

async function conferma() {
  const data = document.getElementById('modal-data').value.trim();
  const ora  = document.getElementById('modal-ora').value.trim();
  const status = document.getElementById('modal-status');

  if (!data || !ora) { status.textContent = 'Inserisci data e ora.'; return; }

  const src = SOURCES[currentTab];
  const repo = src.repo;
  status.textContent = '⏳ Invio in corso…';

  const r = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/sospendi.yml/dispatches`, {
    method: 'POST',
    headers: { Authorization: `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ ref: 'main', inputs: {
      ticket: modalTicket,
      data_app: data,
      ora_app: ora,
      chat_id: '0'
    }})
  });

  if (r.status === 204) {
    status.style.color = 'var(--lavorazione)';
    status.textContent = '✅ Sospensione avviata! (~2 min)';
    setTimeout(closeModal, 2000);
  } else {
    status.style.color = 'red';
    status.textContent = '❌ Errore: ' + r.status;
  }
}

async function loadData() {
  ['assegnato','lavorazione','sospeso'].forEach(c => {
    document.getElementById(`col-${c}`).innerHTML = '<div class="loading">Caricamento…</div>';
    document.getElementById(`cnt-${c}`).textContent = '…';
  });

  const src = SOURCES[currentTab];
  buildProvinceBar(src.province);
  const data = await ghRead(src.repo, 'interacta_data.json');
  cachedData = data;
  renderData(data);
}

async function aggiorna() {
  const btn = document.getElementById('btn-aggiorna');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Aggiornamento…';

  const src = SOURCES[currentTab];

  // Salva il last_update attuale prima di triggerare
  const dataPrima = await ghRead(src.repo, 'interacta_data.json');
  const updatePrima = dataPrima ? dataPrima.last_update : null;

  await fetch(`https://api.github.com/repos/${src.repo}/actions/workflows/fetch.yml/dispatches`, {
    method: 'POST',
    headers: { Authorization: `token ${GH_ACTIONS_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ ref: 'main' })
  });

  let secondi = 0;
  const interval = setInterval(async () => {
    secondi++;
    btn.innerHTML = `<span class="spinner"></span> ${secondi}s…`;

    // Ogni 10 secondi controlla se i dati sono cambiati
    if (secondi % 10 === 0) {
      const dataNuova = await ghRead(src.repo, 'interacta_data.json');
      if (dataNuova && dataNuova.last_update !== updatePrima) {
        clearInterval(interval);
        cachedData = dataNuova;
        renderData(dataNuova);
        btn.disabled = false;
        btn.innerHTML = '<span>🔄</span> Aggiorna';
        return;
      }
    }

    // Fallback: dopo 120 secondi ricarica comunque
    if (secondi >= 120) {
      clearInterval(interval);
      loadData();
      btn.disabled = false;
      btn.innerHTML = '<span>🔄</span> Aggiorna';
    }
  }, 1000);
}

// ── Login / Logout ──────────────────────────────────────────────
const PWD = 'windtre';

function checkLogin() {
  const salvato = localStorage.getItem('crm_login_day');
  const oggi = new Date().toDateString();
  return salvato === oggi;
}

function login() {
  const val = document.getElementById('pwd-input').value;
  if (val === PWD) {
    localStorage.setItem('crm_login_day', new Date().toDateString());
    document.getElementById('login-screen').classList.add('hidden');
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

function esci() {
  localStorage.removeItem('crm_login_day');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('pwd-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

// Controlla login all'avvio
if (checkLogin()) {
  document.getElementById('login-screen').classList.add('hidden');
  loadData();
}
